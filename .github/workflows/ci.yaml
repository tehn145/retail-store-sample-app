name: DevSecOps CI - Multi Services

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'

env:
  AWS_REGION: ap-southeast-1
  ENVIRONMENT: dev
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-secure:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: ui
            context: ./src/ui
            ecr_repo: devsecops-dev-ui
          - name: catalog
            context: ./src/catalog
            ecr_repo: devsecops-dev-catalog
          - name: carts
            context: ./src/cart
            ecr_repo: devsecops-dev-carts
          - name: checkout
            context: ./src/checkout
            ecr_repo: devsecops-dev-checkout
          - name: orders
            context: ./src/orders
            ecr_repo: devsecops-dev-orders

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service.ecr_repo }}:${{ env.IMAGE_TAG }} ${{ matrix.service.context }}

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ matrix.service.ecr_repo }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push image to Amazon ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service.ecr_repo }}:${{ env.IMAGE_TAG }}

      - name: Update GitOps Repository for UI only
        if: matrix.service.name == 'ui'
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/tehn145/devsecops-gitops-config.git
          cd devsecops-gitops-config/k8s/overlays/${ENVIRONMENT}

          sed -i "s|newTag: .*|newTag: ${IMAGE_TAG}|g" kustomization.yaml

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add kustomization.yaml
          git commit -m "Auto-update UI image tag to ${IMAGE_TAG} via CI" || echo "No changes to commit"
          git push
